<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Admin – GrocerGuard{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

<div class="d-flex" style="min-height:100vh">
  <nav class="d-flex flex-column p-3 text-white" style="width:230px;background:#1e6137;min-height:100vh">
    <a href="{{ url_for('products.index') }}" class="text-white text-decoration-none mb-4">
      <i class="bi bi-basket3-fill me-2"></i><strong>GrocerGuard</strong>
    </a>
    <ul class="nav flex-column gap-1">
      <li class="nav-item">
        <a href="{{ url_for('admin.dashboard') }}" class="nav-link text-white {% if request.endpoint == 'admin.dashboard' %}fw-bold{% endif %}">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a href="{{ url_for('admin.orders') }}" class="nav-link text-white {% if request.endpoint == 'admin.orders' %}fw-bold{% endif %}">
          <i class="bi bi-bag me-2"></i>Orders
        </a>
      </li>
      <li class="nav-item">
        <a href="{{ url_for('admin.products') }}" class="nav-link text-white {% if 'product' in request.endpoint %}fw-bold{% endif %}">
          <i class="bi bi-grid me-2"></i>Products
        </a>
      </li>
      <li class="nav-item">
        <a href="{{ url_for('admin.users') }}" class="nav-link text-white {% if request.endpoint == 'admin.users' %}fw-bold{% endif %}">
          <i class="bi bi-people me-2"></i>Users
        </a>
      </li>
    </ul>
    <div class="mt-auto">
      <a href="{{ url_for('products.index') }}" class="nav-link text-white-50">
        <i class="bi bi-arrow-left me-2"></i>Back to Store
      </a>
    </div>
  </nav>

  <div class="flex-grow-1 p-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
