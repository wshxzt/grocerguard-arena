{% extends 'base.html' %}
{% block title %}Forgot Password – GrocerGuard{% endblock %}
{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4">
        <h3 class="mb-2 text-center"><i class="bi bi-lock text-success me-2"></i>Forgot Password</h3>
        <p class="text-muted text-center small mb-4">Enter your registered email and we'll send you a reset link.</p>
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" class="form-control" name="email" required autofocus>
          </div>
          <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
        </form>
        <p class="text-center mt-3 mb-0">
          <a href="{{ url_for('auth.login') }}">Back to Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
