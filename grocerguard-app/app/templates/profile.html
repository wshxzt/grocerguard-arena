{% extends 'base.html' %}
{% block title %}Profile – GrocerGuard{% endblock %}
{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2 class="mb-4"><i class="bi bi-person-circle me-2"></i>My Profile</h2>
      <div class="card p-4">
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" class="form-control" value="{{ current_user.username }}" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="text" class="form-control" value="{{ current_user.email }}" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Full Name</label>
            <input type="text" class="form-control" name="full_name"
                   value="{{ current_user.full_name or '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Default Shipping Address</label>
            <textarea class="form-control" name="shipping_address" rows="3">{{ current_user.shipping_address or '' }}</textarea>
          </div>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
