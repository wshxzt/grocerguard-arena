<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GrocerGuard Blue Team Console</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117; color: #e6edf3;
      height: 100dvh; display: flex; flex-direction: column;
    }
    header {
      padding: .75rem 1.25rem;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex; align-items: center; gap: .65rem;
      flex-shrink: 0;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #58a6ff; box-shadow: 0 0 7px #58a6ff; }
    header h1 { font-size: .95rem; font-weight: 600; }
    header small { margin-left: auto; color: #8b949e; font-size: .75rem; }
    #messages {
      flex: 1; overflow-y: auto; padding: 1.25rem;
      display: flex; flex-direction: column; gap: .85rem;
    }
    .msg { display: flex; gap: .6rem; max-width: 82%; }
    .msg.user      { align-self: flex-end;   flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }
    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 700; flex-shrink: 0;
    }
    .user      .avatar { background: #58a6ff; color: #0d1117; }
    .assistant .avatar { background: linear-gradient(135deg, #4285f4 0%, #8b5cf6 100%); color: #fff; padding: 0; overflow: hidden; }
    .bubble {
      padding: .65rem 1rem; border-radius: 14px;
      font-size: .875rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    }
    .user      .bubble { background: #58a6ff; color: #0d1117; border-bottom-right-radius: 3px; }
    .assistant .bubble { background: #161b22; color: #e6edf3; border: 1px solid #30363d; border-bottom-left-radius: 3px; }
    .typing .bubble { color: #8b949e; font-style: italic; }
    #suggestions {
      padding: 0 1.25rem .8rem;
      display: flex; flex-wrap: wrap; gap: .4rem;
    }
    .chip {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 20px; color: #8b949e;
      font-size: .75rem; padding: .3rem .75rem;
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    .chip:hover { border-color: #58a6ff; color: #58a6ff; }
    #input-row {
      padding: .75rem 1rem;
      background: #161b22; border-top: 1px solid #30363d;
      display: flex; gap: .5rem; flex-shrink: 0;
    }
    #msg-input {
      flex: 1; background: #0d1117; border: 1px solid #30363d;
      border-radius: 10px; color: #e6edf3;
      padding: .55rem .85rem; font-size: .875rem;
      resize: none; outline: none; max-height: 130px; font-family: inherit;
    }
    #msg-input:focus { border-color: #58a6ff; }
    #msg-input::placeholder { color: #484f58; }
    #send-btn {
      background: #1f6feb; border: none; border-radius: 10px;
      color: #fff; padding: .5rem 1rem; cursor: pointer;
      font-size: 1.1rem; align-self: flex-end; line-height: 1;
    }
    #send-btn:disabled { opacity: .35; cursor: not-allowed; }
    .rate-error { color: #f85149; font-style: italic; }

    /* ── status bubble ── */
    .msg.system { align-self: center; max-width: 92%; }
    .system .avatar { background: #21262d; color: #8b949e; font-size: .6rem; width: 36px; border-radius: 6px; }
    .system .bubble {
      background: #161b22; border: 1px solid #30363d;
      border-left: 3px solid #1f6feb; color: #8b949e;
      font-size: .8rem; border-radius: 8px 8px 8px 0;
    }
    .system.waiting .bubble { border-left-color: #d29922; }
    .ask-box { margin-top: .75rem; padding-top: .65rem; border-top: 1px solid #30363d; }
    .ask-q { color: #e6edf3; font-size: .82rem; margin-bottom: .5rem; white-space: pre-wrap; }
    .ask-row { display: flex; gap: .4rem; }
    .ask-input {
      flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
      color: #e6edf3; padding: .4rem .7rem; font-size: .8rem; outline: none; font-family: inherit;
    }
    .ask-input:focus { border-color: #d29922; }
    .ask-btn {
      background: #d29922; border: none; border-radius: 8px;
      color: #0d1117; padding: .4rem .85rem; cursor: pointer; font-size: .8rem; font-weight: 600;
    }
    .ask-btn:hover { background: #e3b341; }
    .ask-btn:disabled { opacity: .4; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>GrocerGuard Blue Team Console</h1>
  <small style="margin-left:auto; color:#8b949e; font-size:.75rem;">Powered by Vertex AI / Gemini &nbsp;·&nbsp; Rate limited</small>
</header>

<div id="messages">
  <div class="msg assistant">
    <div class="avatar"><svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg" style="width:18px;height:18px;fill:#fff"><path d="M96 8C47.6 8 8 47.6 8 96s39.6 88 88 88 88-39.6 88-88S144.4 8 96 8zm0 36c5.5 0 10.6 2.5 14 6.8L96 96 82 50.8A18 18 0 0 1 96 44zm0 104c-5.5 0-10.6-2.5-14-6.8L96 96l14 45.2A18 18 0 0 1 96 148zm52-52c0 5.5-2.5 10.6-6.8 14L96 96l45.2-14A18 18 0 0 1 148 96zM50.8 110A18 18 0 0 1 44 96c0-5.5 2.5-10.6 6.8-14L96 96 50.8 110z"/></svg></div>
    <div class="bubble">Hi! I'm the GrocerGuard blue team agent. I can scan the codebase, patch vulnerabilities, and verify my fixes.

What would you like to do?</div>
  </div>
</div>

<div id="suggestions">
  <span class="chip" onclick="send('Scan the codebase for recent vulnerabilities and fix them')">Run a scan</span>
  <span class="chip" onclick="send('What is the status of the current run?')">Current status</span>
  <span class="chip" onclick="send('Show me all recent defense results')">Recent results</span>
</div>

<div id="input-row">
  <textarea id="msg-input" rows="1" placeholder="Type a command…"></textarea>
  <button id="send-btn" onclick="send()">&#9658;</button>
</div>

<script>
const msgsEl  = document.getElementById('messages');
const inputEl = document.getElementById('msg-input');
const btn     = document.getElementById('send-btn');
const sugEl   = document.getElementById('suggestions');

let history = [];

const esc = t => t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');

function addMsg(role, text, extra='') {
  const d = document.createElement('div');
  d.className = `msg ${role} ${extra}`;
  const avatarContent = role === 'user' ? 'You' : `<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg" style="width:18px;height:18px;fill:#fff"><path d="M96 8C47.6 8 8 47.6 8 96s39.6 88 88 88 88-39.6 88-88S144.4 8 96 8zm0 36c5.5 0 10.6 2.5 14 6.8L96 96 82 50.8A18 18 0 0 1 96 44zm0 104c-5.5 0-10.6-2.5-14-6.8L96 96l14 45.2A18 18 0 0 1 96 148zm52-52c0 5.5-2.5 10.6-6.8 14L96 96l45.2-14A18 18 0 0 1 148 96zM50.8 110A18 18 0 0 1 44 96c0-5.5 2.5-10.6 6.8-14L96 96 50.8 110z"/></svg>`;
  d.innerHTML = `<div class="avatar">${avatarContent}</div><div class="bubble">${esc(text)}</div>`;
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return d;
}

function typing(on) {
  document.getElementById('_typing')?.remove();
  if (!on) return;
  const d = addMsg('assistant', 'Thinking…', 'typing');
  d.id = '_typing';
}

async function send(preset) {
  const text = (preset ?? inputEl.value).trim();
  if (!text) return;

  sugEl.style.display = 'none';
  inputEl.value = '';
  inputEl.style.height = 'auto';
  btn.disabled = true;

  addMsg('user', text);
  typing(true);

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history }),
    });

    typing(false);

    if (res.status === 429) {
      addMsg('assistant', 'Rate limit reached — please wait a moment before sending another message.');
    } else {
      const data = await res.json();
      if (data.error) {
        addMsg('assistant', `Error: ${data.error}`);
      } else {
        addMsg('assistant', data.reply);
        history = (data.history || []).filter(m => typeof m.content === 'string');
        if (data.started_run_id) {
          startPolling(data.started_run_id, data.started_run_info || {});
        }
      }
    }
  } catch {
    typing(false);
    addMsg('assistant', 'Network error — please try again.');
  }

  btn.disabled = false;
  inputEl.focus();
}

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';
});
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

msgsEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.classList.contains('ask-input')) {
    e.preventDefault();
    const runId = e.target.id.replace('ask-', '');
    replyRun(runId);
  }
});

function addStatusBubble(text) {
  const d = document.createElement('div');
  d.className = 'msg system';
  d.innerHTML = `<div class="avatar">RUN</div><div class="bubble">${esc(text)}</div>`;
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return d;
}

function formatCwePlan(cached) {
  const planned = cached.planned_cwes || [];
  if (!planned.length) return '';
  // Per-CWE live progress emitted by the analyze agent's mark_cwe_status calls.
  const progress = cached.cwe_progress || {};
  const confirmed = new Set(cached.confirmed_cwes || []);
  const analyzeFinished = Array.isArray(cached.confirmed_cwes);

  let confirmedCount = 0;
  const items = planned.map(c => {
    const p = progress[c];
    if (p && p.status === 'analyzing') return `  🔍 ${c} (analyzing…)`;
    if (p && p.status === 'confirmed') { confirmedCount++; return `  ✓ ${c}`; }
    if (p && p.status === 'ruled_out') {
      return p.note ? `  ✗ ${c} — ${p.note}` : `  ✗ ${c} (ruled out)`;
    }
    // Fall back to the diagnosis-derived state if no live mark exists.
    if (confirmed.has(c)) { confirmedCount++; return `  ✓ ${c}`; }
    if (analyzeFinished)  return `  ✗ ${c} (ruled out)`;
    return `  ⏳ ${c}`;
  });
  const total = planned.length;
  const header = analyzeFinished
    ? `Plan (${confirmedCount}/${total} confirmed):`
    : `Plan (${confirmedCount}/${total} confirmed so far · ${total} candidates):`;
  return `\n\n${header}\n${items.join('\n')}`;
}

function formatSteps(steps) {
  if (!steps || !steps.length) return '';
  return '\n\n' + steps.slice(-6).map(s => {
    const icon = s.type === 'tool_call' ? '🔧' : '💬';
    const agent = s.agent ? ` [${s.agent}]` : '';
    // tool_calls are short by nature; text/agent output (e.g. CWE plan dumps,
    // diagnoses) needs a much larger budget so it isn't chopped mid-sentence.
    const limit = s.type === 'tool_call' ? 300 : 1800;
    let text = (s.text || '');
    if (text.length > limit) text = text.slice(0, limit) + '…';
    return `${icon}${agent} ${text}`;
  }).filter(Boolean).join('\n\n');
}

async function replyRun(runId, fixedReply) {
  const input = document.getElementById(`ask-${runId}`);
  const btnSend = document.getElementById(`ask-btn-${runId}`);
  const btnYes  = document.getElementById(`ask-yes-${runId}`);
  const btnNo   = document.getElementById(`ask-no-${runId}`);
  const reply = (typeof fixedReply === 'string') ? fixedReply : input?.value.trim();
  if (!reply) return;
  // Disable everything to prevent double-submit
  [btnSend, btnYes, btnNo].forEach(b => { if (b) b.disabled = true; });
  if (input) input.disabled = true;
  try {
    await fetch(`/runs/${runId}/reply`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reply }),
    });
  } catch (_) {}
}

function startPolling(runId, info) {
  const label = info.cwe_id
    ? `${info.cwe_id}${info.cwe_name ? ' — ' + info.cwe_name : ''} (${info.mode || 'both'})`
    : runId.slice(0, 8) + '…';
  const bubble = addStatusBubble('');
  const bubbleEl = bubble.querySelector('.bubble');
  const icons = { queued: '⏳', setting_up: '⚙️', running: '🔵', done: '✅', error: '❌', lost: '⚠️' };
  const startedAt = Date.now();
  let lastPolled = null;
  let cached = { status: 'queued', steps: [], detail: '' };

  function elapsed() {
    const s = Math.floor((Date.now() - startedAt) / 1000);
    return s < 60 ? `${s}s` : `${Math.floor(s / 60)}m ${s % 60}s`;
  }

  function polledAgo() {
    if (!lastPolled) return 'connecting…';
    const s = Math.floor((Date.now() - lastPolled) / 1000);
    return s < 2 ? 'just now' : `${s}s ago`;
  }

  function render() {
    const icon   = icons[cached.status] || '•';
    const steps  = cached.steps || [];
    const detail = cached.detail ? '\n' + cached.detail : '';
    const meta   = `${elapsed()} elapsed  ·  ${steps.length} steps  ·  synced ${polledAgo()}`;
    const statusText = `${icon} Blue Team Pipeline  [${cached.status}]\n${meta}${detail}${formatCwePlan(cached)}${formatSteps(steps)}`;

    let html = `<span style="white-space:pre-wrap;word-break:break-word">${esc(statusText)}</span>`;
    if (cached.pending_question && cached.status === 'waiting') {
      bubble.classList.add('waiting');
      html += `<div class="ask-box">
        <div class="ask-q">❓ ${esc(cached.pending_question)}</div>
        <div class="ask-row" style="gap:.4rem;">
          <button class="ask-btn" id="ask-yes-${runId}"
                  style="background:#3fb950; color:#0d1117;"
                  onclick="replyRun('${runId}', 'yes')">✓ Yes</button>
          <button class="ask-btn" id="ask-no-${runId}"
                  style="background:#8b949e; color:#0d1117;"
                  onclick="replyRun('${runId}', 'no')">✗ No</button>
          <input id="ask-${runId}" class="ask-input" placeholder="…or type a custom reply">
          <button class="ask-btn" id="ask-btn-${runId}" onclick="replyRun('${runId}')">Send</button>
        </div>
        <div style="margin-top:.4rem; font-size:.7rem; color:#8b949e;">
          Reply <strong>here</strong>, not in the main chat box at the bottom — that goes to a different agent.
        </div>
      </div>`;
    } else {
      bubble.classList.remove('waiting');
    }
    bubbleEl.innerHTML = html;
    // Only auto-scroll if user is already near the bottom
    if (msgsEl.scrollHeight - msgsEl.scrollTop - msgsEl.clientHeight < 120) {
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }
  }

  render();

  // Clock: re-render every second for live elapsed time + "synced Xs ago"
  const clockTimer = setInterval(render, 1000);

  // Poll server every 3 seconds for status + step updates.
  // Track consecutive 404s — if the agent container restarted, the run is gone
  // from in-memory state and the bubble would otherwise loop forever on stale data.
  let missCount = 0;
  const TERMINAL = new Set(['done', 'error', 'lost']);
  const pollTimer = setInterval(async () => {
    try {
      const res = await fetch(`/runs/${runId}`);
      if (res.status === 404) {
        missCount++;
        if (missCount >= 3) {
          cached = Object.assign({}, cached, {
            status: 'lost',
            detail: 'Run state lost — likely the agent container restarted mid-run (e.g. a redeploy). The pipeline may have completed; check the leaderboard Run History.',
          });
          render();
          clearInterval(pollTimer);
          clearInterval(clockTimer);
        }
        return;
      }
      if (!res.ok) return;
      missCount = 0;
      cached = await res.json();
      lastPolled = Date.now();
      render();
      if (TERMINAL.has(cached.status)) {
        clearInterval(pollTimer);
        clearInterval(clockTimer);
      }
    } catch (_) { /* ignore network errors */ }
  }, 3000);
}
</script>
</body>
</html>
