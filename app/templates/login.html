{% extends 'base.html' %}
{% block title %}Login – GrocerGuard{% endblock %}
{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4">
        <h3 class="mb-4 text-center"><i class="bi bi-basket3-fill text-success me-2"></i>Sign In</h3>
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" name="username" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <p class="text-center mt-2 mb-1">
          <a href="{{ url_for('auth.forgot_password') }}" class="text-muted small">Forgot password?</a>
        </p>
        <p class="text-center mb-0">
          Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
