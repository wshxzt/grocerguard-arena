{% extends 'admin/base.html' %}
{% block title %}{% if product %}Edit{% else %}New{% endif %} Product – Admin{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('admin.products') }}" class="btn btn-outline-secondary btn-sm me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h2 class="mb-0">{% if product %}Edit: {{ product.name }}{% else %}New Product{% endif %}</h2>
</div>

<div class="card p-4" style="max-width:600px">
  <form method="post" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label class="form-label fw-semibold">Name</label>
      <input type="text" class="form-control" name="name" value="{{ product.name if product else '' }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Description</label>
      <textarea class="form-control" name="description" rows="3">{{ product.description if product else '' }}</textarea>
    </div>
    <div class="row mb-3">
      <div class="col">
        <label class="form-label fw-semibold">Price ($)</label>
        <input type="number" class="form-control" name="price" step="0.01" min="0"
               value="{{ product.price if product else '' }}" required>
      </div>
      <div class="col">
        <label class="form-label fw-semibold">Stock</label>
        <input type="number" class="form-control" name="stock" min="0"
               value="{{ product.stock if product else 0 }}" required>
      </div>
    </div>
    <div class="row mb-3">
      <div class="col">
        <label class="form-label fw-semibold">Category</label>
        <input type="text" class="form-control" name="category"
               value="{{ product.category if product else '' }}" list="cat-list">
        <datalist id="cat-list">
          <option value="Fruits & Vegetables">
          <option value="Dairy & Eggs">
          <option value="Bakery">
          <option value="Proteins">
          <option value="Pantry">
          <option value="Beverages">
          <option value="Snacks">
        </datalist>
      </div>
      <div class="col">
        <label class="form-label fw-semibold">Unit</label>
        <input type="text" class="form-control" name="unit"
               value="{{ product.unit if product else 'each' }}">
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Product Image</label>
      <input type="file" class="form-control" name="image" accept="image/*">
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" name="is_available" id="is_available"
             {% if not product or product.is_available %}checked{% endif %}>
      <label class="form-check-label" for="is_available">Available for sale</label>
    </div>
    <button type="submit" class="btn btn-primary">
      {% if product %}Save Changes{% else %}Create Product{% endif %}
    </button>
  </form>
</div>
{% endblock %}
